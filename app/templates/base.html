<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Cerulean Capybara</a>
    <div class="ms_auto">
      <a class="btn mx-2 {% if title == 'Employee' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('employee') }}">Employee</a>
      <a class="btn mx-2 {% if title == 'Manager' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('manager') }}">Manager</a>
    </div>
    </div>
  </nav>

  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
