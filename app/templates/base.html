<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title|default('Cerulean Capybara') }}</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Cerulean Capybara</a>
    <div class="ms-auto">
      <a class="btn mx-2 {% if title == 'Transaction' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('employee') }}">Transaction</a>
      <a class="btn mx-2 {% if title == 'History' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('history') }}">History</a>
      <a class="btn mx-2 {% if title == 'Manager' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('manager') }}">Manager</a>
      <a class="btn mx-2 {% if title == 'Products' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{{ url_for('inventory') }}">Products</a>
    </div>
    </div>
  </nav>

  <main class="container mt-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-info" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
